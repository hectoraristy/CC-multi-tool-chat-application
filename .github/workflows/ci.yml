name: CI

on:
  pull_request:
    branches: ["**"]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pantsbuild/actions/init-pants@v9
        with:
          gha-cache-key: pants-cache-${{ hashFiles('pants.toml', 'backend/requirements.txt') }}
          named-caches-hash: ${{ hashFiles('pants.toml') }}

      - name: Lint backend
        run: pants lint "backend::"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint
