name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-backend:
    name: Deploy Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        run: |
          docker build -t ${{ secrets.ECR_BACKEND_REPOSITORY_URL }}:${{ github.sha }} \
                        -t ${{ secrets.ECR_BACKEND_REPOSITORY_URL }}:latest \
                        backend/
          docker push ${{ secrets.ECR_BACKEND_REPOSITORY_URL }}:${{ github.sha }}
          docker push ${{ secrets.ECR_BACKEND_REPOSITORY_URL }}:latest

  deploy-frontend:
    name: Deploy Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.BACKEND_API_URL }} \
            -t ${{ secrets.ECR_FRONTEND_REPOSITORY_URL }}:${{ github.sha }} \
            -t ${{ secrets.ECR_FRONTEND_REPOSITORY_URL }}:latest \
            frontend/
          docker push ${{ secrets.ECR_FRONTEND_REPOSITORY_URL }}:${{ github.sha }}
          docker push ${{ secrets.ECR_FRONTEND_REPOSITORY_URL }}:latest
